    expectation: repeated seller-bidder dynamics create exploitable reciprocal patterns
    current_status: not_supported_yet
    notes: underperformed in long baseline high-sample run (`long_parallel_matrix_20260301_013735`)

  - id: H_WCURSE_01
    family: winners_curse_mitigation
    sources:
